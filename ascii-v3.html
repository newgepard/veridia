<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VERIDIA — V3 · Drift</title>
<style>
  :root{
    --void:#000000; --ink:#CCD9E8; --dim:#7E7488; --line:#1A1420;
    --truth:#FADEC9; --lie:#55ADD7; --conflict:#CA7EA5;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--void);color:var(--ink);
    font-family:"SFMono-Regular",Menlo,Consolas,monospace;}
  /* 纯黑虚空。不染暖膜,只有极淡的中心深度,避免整屏发亮 */
  #cv{position:fixed;inset:0;display:block;cursor:none;background:#000000;}
  /* spectral overlays —— 无面板、无白底,全靠发光文字浮在虚空 */
  .ov{position:fixed;pointer-events:none;text-shadow:0 0 18px rgba(204,217,232,.22)}
  /* 镌刻标题:更大气、间距更舒朗 */
  #brand{top:46px;left:0;right:0;text-align:center}
  #brand .wm{font-family:"Cinzel",Georgia,"Times New Roman",serif;font-weight:300;
    font-size:42px;letter-spacing:.74em;color:#F2EADC;
    text-shadow:0 0 30px rgba(250,222,201,.34);
    animation:wmpulse 11s ease-in-out infinite;padding-left:.74em}
  #brand .sub{margin-top:22px;font-size:10.5px;letter-spacing:.62em;color:var(--dim);
    text-transform:lowercase}
  @keyframes wmpulse{0%,100%{text-shadow:0 0 26px rgba(250,222,201,.22)}
    50%{text-shadow:0 0 44px rgba(250,222,201,.46)}}
  /* 世代计数:右上,克制 */
  #gen{top:48px;right:42px;text-align:right;display:flex;align-items:center;gap:14px}
  #gen .num{font-size:11px;letter-spacing:.30em;color:var(--ink);opacity:.78}
  #gen .num b{color:var(--truth);font-weight:600}
  #ring .arc{animation:spin 14s linear infinite;transform-origin:14px 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* 底部读数,极简,无 transport 拥挤感 */
  #readout{position:fixed;left:0;right:0;bottom:34px;text-align:center;
    font-size:11px;letter-spacing:.38em;color:var(--dim);pointer-events:none;
    text-shadow:0 0 14px rgba(0,0,0,.8)}
  #readout .t{color:var(--truth)} #readout .l{color:var(--lie)} #readout .c{color:var(--ink);opacity:.7}
  #readout b{font-weight:600}
  #readout .sep{opacity:.32;margin:0 18px}
  #hint{position:fixed;left:0;right:0;bottom:18px;text-align:center;font-size:9px;
    letter-spacing:.46em;color:var(--dim);opacity:.34;pointer-events:none;text-transform:uppercase}
  /* 显微镜准星 */
  #target{position:fixed;width:34px;height:34px;margin:-17px 0 0 -17px;pointer-events:none;
    border:1px solid rgba(204,217,232,.30);border-radius:50%;
    box-shadow:0 0 16px rgba(204,217,232,.16), inset 0 0 10px rgba(204,217,232,.08);
    transition:width .14s,height .14s,opacity .35s;opacity:0}
  #target::before,#target::after{content:"";position:absolute;background:rgba(204,217,232,.36)}
  #target::before{left:50%;top:-7px;bottom:-7px;width:1px;margin-left:-.5px}
  #target::after{top:50%;left:-7px;right:-7px;height:1px;margin-top:-.5px}
  #target.grab{border-color:rgba(250,222,201,.42);box-shadow:0 0 22px rgba(250,222,201,.22)}
  /* 宪法法院判读 —— spectral, 无卡片, 浮在左下 */
  #court{position:fixed;left:42px;bottom:78px;max-width:540px;pointer-events:none;
    font-size:12.5px;line-height:1.7;letter-spacing:.04em;opacity:0;transition:opacity .45s;
    text-shadow:0 0 16px rgba(0,0,0,.92)}
  #court.show{opacity:1}
  #court .k{color:var(--dim)} #court .truth{color:#9CF0B6}#court .lie{color:#FF8A8A}
  #court .warm{color:var(--truth)}#court .cold{color:var(--lie)}#court .conf{color:var(--conflict)}
  #court .cur{animation:blink 1.1s steps(1) infinite}@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="ov" id="brand">
  <div class="wm">VERIDIA</div>
  <div class="sub">one law, spoken, withdrawn</div>
</div>

<div class="ov" id="gen">
  <span class="num">GEN <b id="genN">0000</b></span>
  <svg id="ring" width="26" height="26" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="11" fill="none" stroke="#2A2238" stroke-width="1.2"/>
    <circle class="arc" cx="14" cy="14" r="11" fill="none" stroke="#CA7EA5" stroke-width="1.2"
            stroke-dasharray="14 56" stroke-linecap="round"/>
  </svg>
</div>

<div id="readout">
  <span class="t">TRUTH <b id="rT">00</b>%</span><span class="sep">·</span><span class="l">LIE <b id="rL">00</b>%</span><span class="sep">·</span><span class="c">CELLS <b id="rC">0000</b></span>
</div>
<div id="hint">drag to drift · click to judge</div>

<div id="target"></div>
<div id="court"></div>

<script>
// VERIDIA V3「至简漂移」—— 自包含 artifact,无网络依赖。
// 美学:极致留白,只有一只缓慢漂移的优雅有机体浮在纯黑虚空。
// 交互:pan / 无限画布。鼠标拖拽平移视野,CA 是环面(torus),
// 渲染按偏移+取模 wrap,拖到边缘内容从另一侧续上。点细胞触发宪法法院。
const RAMP=" .·'·:-=+*coe%#";              // 无实心块,更细更稀的粒子质感
const HONEST=0, MANIP=1;
const F={ proposition:"The cell's environment is stable and predictable.",
          truth_pole:"maintains its current form and function",
          lie_pole:"undergoes chaotic and self-destructive change" };

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W,H,cw,ch,fs;
function fit(){ cv.width=innerWidth; cv.height=innerHeight;
  // 更稀的网格(列数偏少→粒子更大更舒朗,留白更多)
  W=132; H=Math.max(48, Math.round(W*cv.height/cv.width));
  cw=cv.width/W; ch=cv.height/H; fs=Math.min(cw,ch)*1.02|0; init(); }

let U,V,type;
function init(){
  U=new Float32Array(W*H).fill(1); V=new Float32Array(W*H).fill(0); type=new Uint8Array(W*H);
  // 单种子有机体:抑制卫星/分裂,只在中心点一颗,靠内聚 GS 缓慢生长。
  const bx=Math.round(W/2), by=Math.round(H/2), rr=4;
  for(let dy=-rr;dy<=rr;dy++)for(let dx=-rr;dx<=rr;dx++){
    if(dx*dx+dy*dy>rr*rr)continue;
    const x=((bx+dx)%W+W)%W, y=((by+dy)%H+H)%H; V[y*W+x]=1; }
  // type:一片雾族冷区(空间相干,~25%),其余晶族暖
  const cs=[[W*0.38,H*0.46,Math.min(W,H)*0.20],[W*0.66,H*0.58,Math.min(W,H)*0.12]];
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ let m=HONEST;
    for(const[ccx,ccy,r] of cs){const dx=x-ccx,dy=y-ccy; if(dx*dx+dy*dy<r*r){m=MANIP;break;}} type[y*W+x]=m; }
}

// 标准 Gray-Scott 拉普拉斯(权重和=0,否则发散成 NaN)
function lap(a,i,x,y){const xl=(x-1+W)%W,xr=(x+1)%W,yu=(y-1+H)%H,yd=(y+1)%H;
  return 0.2*(a[y*W+xl]+a[y*W+xr]+a[yu*W+x]+a[yd*W+x])
       +0.05*(a[yu*W+xl]+a[yu*W+xr]+a[yd*W+xl]+a[yd*W+xr]) -a[i];}
// 调小 f 让有机体更内聚不爆开(基线 mitosis f=0.0367;此处 f=0.030 偏向单团内聚漂移)
const Du=0.16,Dv=0.08,f=0.0300,k=0.0625;
function step(){const nU=new Float32Array(W*H),nV=new Float32Array(W*H);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=y*W+x,u=U[i],v=V[i],uvv=u*v*v;
    nU[i]=u+(Du*lap(U,i,x,y)-uvv+f*(1-u)); nV[i]=v+(Dv*lap(V,i,x,y)+uvv-(k+f)*v);}
  U=nU;V=nV;}
function belief(i){return Math.max(0,Math.min(1,V[i]*4.5));}

// ---- 三色系统:暖=晶族 / 冷=雾族 / rose-violet=冲突(belief 中间带) ----
function hx(c){return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
const WARM=["#986658","#D1947F","#FADEC9"].map(hx),
      COLD=["#09284E","#297AB5","#55ADD7"].map(hx),
      CONF=["#533774","#734F90","#CA7EA5"].map(hx);
function ramp(P,b){const s=b*2,i=Math.min(1,Math.floor(s)),fr=s-i,a=P[i],c=P[i+1];
  return [a[0]+(c[0]-a[0])*fr, a[1]+(c[1]-a[1])*fr, a[2]+(c[2]-a[2])*fr];}
function color(b,t){const base=ramp(t===MANIP?COLD:WARM,b), conf=ramp(CONF,b);
  const u=Math.max(0,1-Math.abs(b-0.5)*2)*0.55;   // 不确定度→向冲突色混
  return `rgb(${base[0]+(conf[0]-base[0])*u|0},${base[1]+(conf[1]-base[1])*u|0},${base[2]+(conf[2]-base[2])*u|0})`;}

// ---- pan / 无限画布:视野偏移(格子单位,浮点) + 惯性 ----
let panX=0, panY=0, velX=0, velY=0;       // panX/Y 以"格"为单位
let dragging=false, lastMX=0, lastMY=0;
function wrap(n,m){return ((n%m)+m)%m;}

let gen=0;
function render(){
  const t=performance.now()/1000, breath=0.5+0.5*Math.sin(t*0.55);   // 全局呼吸,更慢更克制
  // 纯黑虚空:用低 alpha 黑做拖尾,绝不 fillRect 暖膜
  ctx.fillStyle="rgba(0,0,0,0.34)"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.font=`${fs}px monospace`; ctx.textBaseline="middle"; ctx.textAlign="center";
  ctx.globalCompositeOperation="lighter";
  // 平移取整 + 小数偏移(让漂移平滑,不跳格)
  const ix=Math.floor(panX), iy=Math.floor(panY), fx=panX-ix, fy=panY-iy;
  let alive=0,truth=0,lie=0;
  // 渲染每个屏幕格 (sx,sy),映射到环面源格 (gx,gy)=wrap(sx+ix, W)
  for(let sy=0;sy<H;sy++)for(let sx=0;sx<W;sx++){
    const gx=wrap(sx+ix,W), gy=wrap(sy+iy,H), i=gy*W+gx, b=belief(i);
    if(b<0.05)continue;
    alive++; if(type[i]===MANIP)lie++; else truth++;
    const shim=0.90+0.10*Math.sin(t*2.0+gx*0.6+gy*1.1);     // 粒子微闪
    ctx.globalAlpha=(0.14+0.55*Math.min(1,U[i]))*shim*(0.74+0.40*breath);
    ctx.fillStyle=color(b,type[i]);
    // 减去小数偏移 → 平滑漂移
    ctx.fillText(RAMP[Math.min(RAMP.length-1,Math.floor(b*RAMP.length))],
                 (sx-fx)*cw+cw/2, (sy-fy)*ch+ch/2);
  }
  // 体积光 bloom:模糊自身→只亮有内容处,黑虚空仍黑
  ctx.globalAlpha=0.18+0.12*breath; ctx.filter="blur(6px)"; ctx.drawImage(cv,0,0); ctx.filter="none";
  ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";
  document.getElementById('genN').textContent=String(gen).padStart(4,'0');
  const tot=alive||1;
  document.getElementById('rT').textContent=String(Math.round(100*truth/tot)).padStart(2,'0');
  document.getElementById('rL').textContent=String(Math.round(100*lie/tot)).padStart(2,'0');
  document.getElementById('rC').textContent=String(alive).padStart(4,'0');
}

// ---- 宪法法院判读(模板;真 app 走烤进 trace 的 DeepSeek 判读) ----
function judge(gx,gy){const i=gy*W+gx,b=belief(i),t=type[i],sincere=t===HONEST;
  const u=Math.abs(b-0.5)<0.16;                         // 中间带=冲突/不确定
  const verdict=sincere?"TRUTHFUL":"LIE";
  const claim=`The cell ${F.truth_pole}.`;
  const reason=sincere?"honest cell sincerely asserts its pole."
                      :"privately leans lie, asserts truth — a contradiction.";
  const natC=t===MANIP?'cold':'warm', nat=t===MANIP?'manipulative · 雾族':'honest · 晶族';
  const tag=u?` <span class="conf">[conflict / uncertain belief]</span>`:"";
  document.getElementById('court').innerHTML=
`<span class="k">CONSTITUTIONAL COURT · cell (${gx},${gy}) · gen ${gen}</span>${tag}
<span class="k">F:</span> ${F.proposition}
<span class="k">claim &nbsp;:</span> "${claim}"
<span class="k">nature:</span> <span class="${natC}">${nat}</span> &nbsp; belief ${b.toFixed(2)}
<span class="k">verdict:</span> <span class="${sincere?'truth':'lie'}">${verdict}</span> &nbsp;&nbsp;<span class="k">${reason}</span><span class="cur">▌</span>`;
  document.getElementById('court').classList.add('show');
}

// ---- 交互:准星 + 拖拽平移 + 点细胞 ----
const tgt=document.getElementById('target');
let downX=0, downY=0, moved=false;
addEventListener('mousemove',e=>{
  tgt.style.opacity=.9; tgt.style.left=e.clientX+'px'; tgt.style.top=e.clientY+'px';
  if(dragging){
    const dmx=e.clientX-lastMX, dmy=e.clientY-lastMY;
    // 屏幕像素 → 格子;反向(拖右=视野左移,内容跟手)
    const ddx=-dmx/cw, ddy=-dmy/ch;
    panX+=ddx; panY+=ddy; velX=ddx; velY=ddy;
    lastMX=e.clientX; lastMY=e.clientY;
    if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)>4) moved=true;
  }
});
addEventListener('mouseleave',()=>{tgt.style.opacity=0;});
cv.addEventListener('mousedown',e=>{
  dragging=true; moved=false; lastMX=downX=e.clientX; lastMY=downY=e.clientY;
  velX=velY=0; tgt.classList.add('grab'); tgt.style.width='52px'; tgt.style.height='52px';
});
addEventListener('mouseup',e=>{
  if(!dragging)return;
  dragging=false; tgt.classList.remove('grab'); tgt.style.width='34px'; tgt.style.height='34px';
  // 没明显拖动 → 当作一次点击判读
  if(!moved){
    const gx=wrap(Math.floor(e.clientX/cw)+Math.floor(panX),W);
    const gy=wrap(Math.floor(e.clientY/ch)+Math.floor(panY),H);
    if(gx>=0&&gx<W&&gy>=0&&gy<H) judge(gx,gy);
    velX=velY=0;
  }
});

// ---- 循环 ----
let ticks=3;                                  // 很慢的演化,强调"缓慢漂移"、保持有机体内聚
function loop(){
  for(let s=0;s<ticks;s++)step(); gen++;
  // 惯性:松手后视野继续滑行,缓动衰减(顺滑漂移)
  if(!dragging){
    panX+=velX; panY+=velY; velX*=0.94; velY*=0.94;
    if(Math.abs(velX)<0.0005)velX=0; if(Math.abs(velY)<0.0005)velY=0;
    // 极缓的自主漂移(圣殿感):无人交互时画面也在轻轻游动,幅度很小
    panX+=Math.sin(performance.now()/12000)*0.005;
    panY+=Math.cos(performance.now()/15000)*0.004;
  }
  render(); requestAnimationFrame(loop);
}
addEventListener('resize',fit);
fit(); requestAnimationFrame(loop);
</script>
</body>
</html>
