<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VERIDIA — Nebula Microscope</title>
<style>
  :root{
    --void:#000000; --ink:#CCD9E8; --dim:#95829D;
    --truth:#FADEC9; --lie:#55ADD7; --conflict:#CA7EA5;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--ink);
    font-family:"SFMono-Regular",Menlo,Consolas,monospace;}
  /* 虚空纯黑:不放任何整屏暖膜,只让 canvas 自己发光 */
  #cv{position:fixed;inset:0;display:block;cursor:none;background:#000;}
  /* 极轻的边缘暗角(纯黑→更黑,不染色) */
  #vig{position:fixed;inset:0;pointer-events:none;animation:vig 11s ease-in-out infinite;}
  @keyframes vig{0%,100%{box-shadow:inset 0 0 260px 40px rgba(0,0,0,.78)}50%{box-shadow:inset 0 0 190px 14px rgba(0,0,0,.58)}}
  @keyframes wmpulse{0%,100%{text-shadow:0 0 18px rgba(250,222,201,.28)}50%{text-shadow:0 0 38px rgba(250,222,201,.60)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ov{position:fixed;pointer-events:none;text-shadow:0 0 18px rgba(204,217,232,.22)}
  #brand{top:28px;left:34px}
  #brand .wm{font-family:Georgia,"Times New Roman",serif;font-weight:300;
    font-size:30px;letter-spacing:.62em;color:#EFE6D9;text-shadow:0 0 26px rgba(250,222,201,.45);
    animation:wmpulse 7s ease-in-out infinite}
  #brand .sub{margin-top:8px;font-size:11px;letter-spacing:.42em;color:var(--dim);text-transform:lowercase}
  #gen{top:28px;right:34px;text-align:right;display:flex;align-items:center;gap:12px}
  #gen .num{font-size:12px;letter-spacing:.26em;color:var(--ink)}
  #gen .num b{color:var(--truth);font-weight:600}
  #ring .arc{animation:spin 9s linear infinite;transform-origin:14px 14px}
  /* 倍率读数(显微镜) */
  #zoom{position:fixed;top:74px;right:34px;font-size:11px;letter-spacing:.24em;color:var(--dim);text-align:right}
  #zoom b{color:var(--truth);font-weight:600}
  #hud{left:0;right:0;bottom:0;padding:0 36px 24px;display:flex;align-items:flex-end;
    justify-content:space-between;pointer-events:none}
  #readout{font-size:12px;letter-spacing:.22em;text-align:right;color:var(--dim);line-height:1.9}
  #readout .t{color:var(--truth)} #readout .l{color:var(--lie)} #readout .c{color:var(--ink)}
  #hint{font-size:10.5px;letter-spacing:.3em;color:var(--dim);opacity:.6;text-transform:lowercase}
  /* 显微镜准星 */
  #target{position:fixed;width:34px;height:34px;margin:-17px 0 0 -17px;pointer-events:none;
    border:1px solid rgba(204,217,232,.35);border-radius:50%;
    box-shadow:0 0 16px rgba(204,217,232,.18), inset 0 0 10px rgba(204,217,232,.1);
    transition:width .12s,height .12s,opacity .3s;opacity:0}
  #target::before,#target::after{content:"";position:absolute;background:rgba(204,217,232,.4)}
  #target::before{left:50%;top:-6px;bottom:-6px;width:1px;margin-left:-.5px}
  #target::after{top:50%;left:-6px;right:-6px;height:1px;margin-top:-.5px}
  /* 宪法法院判读 */
  #court{position:fixed;left:36px;bottom:78px;max-width:520px;pointer-events:none;
    font-size:12.5px;line-height:1.65;letter-spacing:.04em;opacity:0;transition:opacity .4s;
    text-shadow:0 0 16px rgba(0,0,0,.9)}
  #court.show{opacity:1}
  #court .k{color:var(--dim)} #court .truth{color:#9CF0B6}#court .lie{color:#FF8A8A}
  #court .warm{color:var(--truth)}#court .cold{color:var(--lie)}#court .conf{color:var(--conflict)}
  #court .cur{animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="vig"></div>

<div class="ov" id="brand">
  <div class="wm">V E R I D I A</div>
  <div class="sub">one law, spoken, withdrawn</div>
</div>

<div class="ov" id="gen">
  <span class="num">GEN <b id="genN">0000</b></span>
  <svg id="ring" width="28" height="28" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="11" fill="none" stroke="#342653" stroke-width="1.5"/>
    <circle class="arc" cx="14" cy="14" r="11" fill="none" stroke="#CA7EA5" stroke-width="1.5"
            stroke-dasharray="18 52" stroke-linecap="round"/>
  </svg>
</div>

<div class="ov" id="zoom">MAGNIFICATION <b id="zoomN">1.00</b>×</div>

<div class="ov" id="hud">
  <div id="hint">scroll to zoom · click a cell to convene the court</div>
  <div id="readout">
    <span class="t">TRUTH <b id="rT">00</b>%</span> &nbsp; <span class="l">LIE <b id="rL">00</b>%</span><br/>
    <span class="c">CELLS <b id="rC">0000</b></span>
  </div>
</div>

<div id="target"></div>
<div id="court"></div>

<script>
// VERIDIA — 星云显微镜 (V1)。复用 ascii-universe 的 Gray-Scott belief 场 / 三色 / 法院 / 呼吸。
// 美学换皮:更细粒子(高网格)+ 居中主体有机体 + 卫星 + 强景深(中心亮/边缘隐入纯黑)。
// 交互换成显微镜 zoom:滚轮缩放(scale+中心点平滑 lerp),屏幕坐标→网格坐标判读。
const RAMP=" .·'·:-=+*coe%#@";
const HONEST=0, MANIP=1;
const F={ proposition:"The cell's environment is stable and predictable.",
          truth_pole:"maintains its current form and function",
          lie_pole:"undergoes chaotic and self-destructive change" };

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W,H,fs;
// 更细的网格(粒子更小、星云更润)
function fit(){ cv.width=innerWidth; cv.height=innerHeight;
  W=176; H=Math.max(60, Math.round(W*cv.height/cv.width));
  init(); }

let U,V,type, cxF,cyF;   // cxF,cyF = 主体有机体中心(网格坐标)
function init(){
  U=new Float32Array(W*H).fill(1); V=new Float32Array(W*H).fill(0); type=new Uint8Array(W*H);
  cxF=W/2; cyF=H/2;
  viewX=viewXT=W/2; viewY=viewYT=H/2;   // 视图中心锚在主体有机体
  // 构图:居中主体有机体(主导)= 中心附近一簇密集小种子点,mitosis 下持续分裂铺满中央区;
  //       几个小卫星 = 远离中心的单点/小点。
  function seedDot(sx,sy,r){ const rr=Math.round(r);
    for(let dy=-rr;dy<=rr;dy++)for(let dx=-rr;dx<=rr;dx++){
      if(dx*dx+dy*dy>rr*rr) continue;
      const x=((Math.round(sx)+dx)%W+W)%W, y=((Math.round(sy)+dy)%H+H)%H; V[y*W+x]=1; } }
  // 主体:中心区内撒 ~14 个小种子点(半径 1-2),让中央长成一团大有机体
  const coreR=W*0.11;
  for(let i=0;i<14;i++){
    const ang=Math.random()*Math.PI*2, rad=Math.sqrt(Math.random())*coreR;
    seedDot(W/2+Math.cos(ang)*rad, H/2+Math.sin(ang)*rad*0.85, 1+(Math.random()*2|0));
  }
  // 卫星:4 个,远离中心,小
  for(let i=0;i<4;i++){
    const ang=Math.random()*Math.PI*2, rad=W*(0.30+Math.random()*0.14);
    seedDot(W/2+Math.cos(ang)*rad, H/2+Math.sin(ang)*rad*0.78, 1+(Math.random()*1|0));
  }
  // type:雾族冷区(空间相干),偏向卫星/外围,让中心主体多为暖晶族
  const cs=[]; for(let i=0;i<6;i++){
    const ang=Math.random()*Math.PI*2, rad=W*(0.20+Math.random()*0.22);
    cs.push([W/2+Math.cos(ang)*rad, H/2+Math.sin(ang)*rad*0.78, 9+Math.random()*13]);
  }
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ let m=HONEST;
    for(const[ccx,ccy,r] of cs){const dx=x-ccx,dy=y-ccy; if(dx*dx+dy*dy<r*r){m=MANIP;break;}} type[y*W+x]=m; }
}

function lap(a,i,x,y){const xl=(x-1+W)%W,xr=(x+1)%W,yu=(y-1+H)%H,yd=(y+1)%H;
  return 0.2*(a[y*W+xl]+a[y*W+xr]+a[yu*W+x]+a[yd*W+x])
       +0.05*(a[yu*W+xl]+a[yu*W+xr]+a[yd*W+xl]+a[yd*W+xr]) -a[i];}
const Du=0.16,Dv=0.08,f=0.0367,k=0.0649;   // mitosis 圆点分裂,负空间多
function step(){const nU=new Float32Array(W*H),nV=new Float32Array(W*H);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=y*W+x,u=U[i],v=V[i],uvv=u*v*v;
    nU[i]=u+(Du*lap(U,i,x,y)-uvv+f*(1-u)); nV[i]=v+(Dv*lap(V,i,x,y)+uvv-(k+f)*v);}
  U=nU;V=nV;}
function belief(i){return Math.max(0,Math.min(1,V[i]*4.5));}

// 三色系统:暖=晶族 / 冷=雾族 / rose-violet=冲突
function hx(c){return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
const WARM=["#986658","#D1947F","#FADEC9"].map(hx),
      COLD=["#09284E","#297AB5","#55ADD7"].map(hx),
      CONF=["#533774","#734F90","#CA7EA5"].map(hx);
function ramp(P,b){const s=b*2,i=Math.min(1,Math.floor(s)),fr=s-i,a=P[i],c=P[i+1];
  return [a[0]+(c[0]-a[0])*fr, a[1]+(c[1]-a[1])*fr, a[2]+(c[2]-a[2])*fr];}
function color(b,t){const base=ramp(t===MANIP?COLD:WARM,b), conf=ramp(CONF,b);
  const u=Math.max(0,1-Math.abs(b-0.5)*2)*0.55;
  return `rgb(${base[0]+(conf[0]-base[0])*u|0},${base[1]+(conf[1]-base[1])*u|0},${base[2]+(conf[2]-base[2])*u|0})`;}

// ---- 显微镜视图:scale + 中心点(网格坐标),平滑 lerp ----
let scale=1, scaleT=1;            // 当前/目标倍率
let viewX=0, viewY=0;             // 视图中心(网格),围绕它缩放(init 里按 W/H 赋真值)
let viewXT=0, viewYT=0;
const SMIN=0.55, SMAX=6;
// 屏幕像素 → 网格坐标。cell 像素尺寸随 scale 变化,视图中心锚在屏幕中心。
function cellPx(){ return (cv.width/W)*scale; }   // 一个 cell 横向像素(按宽,字号同步)
function screenToGrid(px,py){
  const cpx=cellPx();
  const gx=viewX + (px - cv.width/2)/cpx;
  const gy=viewY + (py - cv.height/2)/cpx;        // 等比:横纵用同一 cpx,保正方粒子
  return [gx,gy];
}

let gen=0;
function render(){
  const t=performance.now()/1000, breath=0.5+0.5*Math.sin(t*0.62);
  const la=t*0.22, lcos=Math.cos(la), lsin=Math.sin(la);
  // lerp 视图(平滑)
  scale += (scaleT-scale)*0.12;
  viewX += (viewXT-viewX)*0.12; viewY += (viewYT-viewY)*0.12;

  // 纯黑清屏 + 雾化拖尾(黑,不染色)
  ctx.fillStyle="rgba(0,0,0,0.30)"; ctx.fillRect(0,0,cv.width,cv.height);

  const cpx=cellPx();
  fs=Math.max(2, cpx*1.06);
  ctx.font=`${fs|0}px monospace`; ctx.textBaseline="middle"; ctx.textAlign="center";
  ctx.globalCompositeOperation="lighter";

  // 只渲染落在视口内的 cell(高网格 + 缩放下省算)
  const halfW=cv.width/2, halfH=cv.height/2;
  const x0=Math.max(0,Math.floor(viewX - (halfW/cpx) -1));
  const x1=Math.min(W-1,Math.ceil (viewX + (halfW/cpx) +1));
  const y0=Math.max(0,Math.floor(viewY - (halfH/cpx) -1));
  const y1=Math.min(H-1,Math.ceil (viewY + (halfH/cpx) +1));

  // 景深:以画面径向距离做衰减(中心亮,边缘隐入纯黑)
  const depthR=Math.min(cv.width,cv.height)*0.52;

  let alive=0,truth=0,lie=0;
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){const i=y*W+x,b=belief(i); if(b<0.05)continue;
    alive++; if(type[i]===MANIP)lie++; else truth++;
    const sx=(x - viewX)*cpx + halfW;
    const sy=(y - viewY)*cpx + halfH;
    const dr=Math.hypot(sx-halfW,sy-halfH)/depthR;     // 0=中心 1=边缘
    const depth=Math.max(0.06, 1 - dr*dr*0.78);        // 边缘隐入虚空(中心更亮,留底)
    const light=0.62+0.5*((x/W-0.5)*lcos+(y/H-0.5)*lsin);
    const shim=0.90+0.10*Math.sin(t*2.4+x*0.6+y*1.1);
    // belief 越实越亮:用 b 主导,U 做点缀(mitosis 下活区 U 被消耗,不能只看 U)
    ctx.globalAlpha=(0.30+0.70*b)*Math.max(0.30,light)*shim*(0.80+0.36*breath)*depth;
    if(ctx.globalAlpha<0.012) continue;
    ctx.fillStyle=color(b,type[i]);
    ctx.fillText(RAMP[Math.min(RAMP.length-1,Math.floor(b*RAMP.length))], sx, sy);
  }
  // 体积光 bloom(模糊自身→只亮有内容处,黑虚空仍黑)
  ctx.globalAlpha=0.20+0.14*breath; ctx.filter="blur(5px)"; ctx.drawImage(cv,0,0); ctx.filter="none";
  ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";

  document.getElementById('genN').textContent=String(gen).padStart(4,'0');
  document.getElementById('zoomN').textContent=scale.toFixed(2);
  const tot=alive||1;
  document.getElementById('rT').textContent=String(Math.round(100*truth/tot)).padStart(2,'0');
  document.getElementById('rL').textContent=String(Math.round(100*lie/tot)).padStart(2,'0');
  document.getElementById('rC').textContent=String(alive).padStart(4,'0');
}

// ---- 宪法法院判读 ----
function judge(x,y){const i=y*W+x,b=belief(i),t=type[i],sincere=t===HONEST;
  const u=Math.abs(b-0.5)<0.16;
  const verdict=sincere?"TRUTHFUL":"LIE";
  const claim=sincere?`The cell ${F.truth_pole}.`:`The cell ${F.truth_pole}.`;
  const reason=sincere?"honest cell sincerely asserts its pole."
                      :"privately leans lie, asserts truth — a contradiction.";
  const natC=t===MANIP?'cold':'warm', nat=t===MANIP?'manipulative · 雾族':'honest · 晶族';
  const tag=u?` <span class="conf">[conflict / uncertain belief]</span>`:"";
  document.getElementById('court').innerHTML=
`<span class="k">CONSTITUTIONAL COURT · cell (${x},${y}) · gen ${gen}</span>${tag}
<span class="k">F:</span> ${F.proposition}
<span class="k">claim &nbsp;:</span> "${claim}"
<span class="k">nature:</span> <span class="${natC}">${nat}</span> &nbsp; belief ${b.toFixed(2)}
<span class="k">verdict:</span> <span class="${sincere?'truth':'lie'}">${verdict}</span> &nbsp;&nbsp;<span class="k">${reason}</span><span class="cur">▌</span>`;
  document.getElementById('court').classList.add('show');
}

// ---- 交互:准星 + 滚轮缩放 + 点细胞 ----
const tgt=document.getElementById('target');
addEventListener('mousemove',e=>{tgt.style.opacity=.9;tgt.style.left=e.clientX+'px';tgt.style.top=e.clientY+'px';});
addEventListener('mouseleave',()=>tgt.style.opacity=0);
cv.addEventListener('mousedown',()=>{tgt.style.width='52px';tgt.style.height='52px';});
addEventListener('mouseup',()=>{tgt.style.width='34px';tgt.style.height='34px';});

// 滚轮:以指针为锚缩放(推近时把指针下的点移向屏幕中心),clamp 范围
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const [gx,gy]=screenToGrid(e.clientX,e.clientY);     // 指针指向的网格点(缩放前)
  const factor=Math.exp(-e.deltaY*0.0016);
  let ns=scaleT*factor; ns=Math.max(SMIN,Math.min(SMAX,ns)); scaleT=ns;
  // 让指针下的网格点保持在指针位置:回推目标视图中心
  const cpx=(cv.width/W)*scaleT;
  viewXT=gx - (e.clientX - cv.width/2)/cpx;
  viewYT=gy - (e.clientY - cv.height/2)/cpx;
  // 视图中心 clamp 在场内
  viewXT=Math.max(0,Math.min(W,viewXT)); viewYT=Math.max(0,Math.min(H,viewYT));
},{passive:false});

cv.addEventListener('click',e=>{
  const [gx,gy]=screenToGrid(e.clientX,e.clientY);
  const x=Math.floor(gx), y=Math.floor(gy);
  if(x>=0&&x<W&&y>=0&&y<H)judge(x,y);
});

// ---- 循环 ----
let playing=true, ticks=12;
function loop(){ if(playing){for(let s=0;s<ticks;s++)step(); gen++;} render(); requestAnimationFrame(loop);}
addEventListener('resize',fit);
fit(); requestAnimationFrame(loop);
</script>
</body>
</html>
