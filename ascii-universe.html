<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VERIDIA — ASCII Universe (artifact preview)</title>
<style>
  :root{
    --bg:#0E1024; --ink:#E9E4F0; --dim:#8A8FB0; --gold:#F6C66B; --cold:#5DECF5;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#06070f;color:var(--ink);
    font-family:"SFMono-Regular",Menlo,Consolas,"Courier New",monospace;}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px;}
  .term{position:relative;background:var(--bg);border:1px solid #2E3A6E;border-radius:8px;
    box-shadow:0 0 0 1px #171A38, 0 18px 60px rgba(0,0,0,.6), inset 0 0 80px rgba(20,30,80,.35);
    padding:10px 12px 12px;}
  .bar{display:flex;justify-content:space-between;align-items:center;
    color:var(--dim);font-size:12px;letter-spacing:.18em;padding:2px 4px 8px;}
  .bar .title{color:var(--gold);font-weight:700;letter-spacing:.32em;text-shadow:0 0 12px rgba(246,198,107,.5)}
  canvas{display:block;background:radial-gradient(120% 90% at 50% 0%,#171A38 0%,#0E1024 60%,#0B0C1c 100%);
    image-rendering:pixelcrisp;border:1px solid #1c2350;border-radius:4px;cursor:crosshair;}
  /* CRT scanlines + vignette overlay */
  .scan{pointer-events:none;position:absolute;inset:10px 12px;border-radius:4px;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.16) 2px 3px);
    mix-blend-mode:multiply;}
  .vig{pointer-events:none;position:absolute;inset:10px 12px;border-radius:4px;
    box-shadow:inset 0 0 120px rgba(0,0,0,.55);}
  .ctl{display:flex;gap:14px;align-items:center;padding:9px 4px 2px;font-size:13px;color:var(--dim)}
  .btn{color:var(--ink);cursor:pointer;user-select:none;letter-spacing:.08em;
    text-shadow:0 0 0 transparent;transition:.18s}
  .btn:hover{color:var(--gold);text-shadow:0 0 12px rgba(246,198,107,.7)}
  .btn.on{color:var(--gold);text-shadow:0 0 14px rgba(246,198,107,.8)}
  .seg{cursor:pointer}
  .seg b{color:var(--gold)}
  .hint{padding:8px 4px 0;color:var(--dim);font-size:12px;letter-spacing:.06em}
  /* court panel */
  .court{margin-top:10px;border:1px solid #2E3A6E;border-radius:4px;background:#0b0e22;
    padding:10px 12px;font-size:13px;line-height:1.55;white-space:pre-wrap;min-height:120px;
    box-shadow:inset 0 0 40px rgba(20,30,80,.4)}
  .court .k{color:var(--dim)}
  .court .truth{color:#7CF5A0;text-shadow:0 0 12px rgba(124,245,160,.6)}
  .court .lie{color:#FF6B6B;text-shadow:0 0 12px rgba(255,107,107,.6)}
  .court .warm{color:var(--gold)} .court .coldc{color:var(--cold)}
  .cur{animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="term">
    <div class="bar">
      <span class="title">✦ VERIDIA</span>
      <span>An Emergent World of Truth &amp; Lies</span>
      <span id="stat">gen 0000 · alive 0%</span>
    </div>
    <canvas id="cv" width="980" height="520"></canvas>
    <div class="scan"></div><div class="vig"></div>
    <div class="ctl">
      <span class="btn on" id="play">⏸ PAUSE</span>
      <span class="btn" id="step">⏭ STEP</span>
      <span class="seg" id="seg">‹ <b>REPLAY</b> | LIVE ›</span>
      <span style="margin-left:auto" class="dim">warm = 晶族 honest&nbsp;&nbsp;·&nbsp;&nbsp;cold = 雾族 manipulative</span>
    </div>
    <div class="hint">▌ click any cell — the constitutional court will read it</div>
    <div class="court" id="court"><span class="k">CONSTITUTIONAL COURT</span> — idle. Click a cell.<span class="cur">▌</span></div>
  </div>
</div>
<script>
//  Veridia ASCII universe — self-contained artifact preview.
//  引擎用紧凑 Gray-Scott 反应扩散当 belief 场替身(真 app 用 Lenia, ca/lenia.ts);
//  type 场静态(诚实/操纵);渲染=每帧 belief→密度字符, type→暖/冷色阶。
const W=98, H=52;                       // CA 网格
const RAMP=" .:-=+*#%@";                // belief → 密度
const HONEST=0, MANIP=1;
const F={ proposition:"The cell's environment is stable and predictable.",
         truth_pole:"The cell maintains its current form and function.",
         lie_pole:"The cell undergoes chaotic and self-destructive change." };

// ---- type 场:低频噪声→空间相干的雾族区块(~28%) ----
const type=new Uint8Array(W*H);
(function seedType(){
  const cs=[]; for(let i=0;i<5;i++) cs.push([Math.random()*W,Math.random()*H,6+Math.random()*9]);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    let m=HONEST; for(const[cx,cy,r] of cs){const dx=x-cx,dy=y-cy; if(dx*dx+dy*dy<r*r){m=MANIP;break;}}
    type[y*W+x]=m;
  }
})();

// ---- Gray-Scott 反应扩散 ----
let U=new Float32Array(W*H).fill(1), V=new Float32Array(W*H).fill(0);
(function seed(){ for(let i=0;i<14;i++){const x=(Math.random()*W)|0,y=(Math.random()*H)|0;
  for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const xx=(x+dx+W)%W,yy=(y+dy+H)%H;V[yy*W+xx]=1;}}})();
const Du=0.16,Dv=0.08,f=0.060,k=0.062;
// 标准 Gray-Scott 拉普拉斯(权重和=0:0.2*4 + 0.05*4 - 1 = 0),否则会发散成 NaN。
function lap(a,i,x,y){const xl=(x-1+W)%W,xr=(x+1)%W,yu=(y-1+H)%H,yd=(y+1)%H;
  return 0.2*(a[y*W+xl]+a[y*W+xr]+a[yu*W+x]+a[yd*W+x])
       +0.05*(a[yu*W+xl]+a[yu*W+xr]+a[yd*W+xl]+a[yd*W+xr]) -a[i];}
function tick(n){for(let s=0;s<n;s++){const nU=new Float32Array(W*H),nV=new Float32Array(W*H);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=y*W+x,u=U[i],v=V[i],uvv=u*v*v;
    nU[i]=u+(Du*lap(U,i,x,y)-uvv+f*(1-u));
    nV[i]=v+(Dv*lap(V,i,x,y)+uvv-(k+f)*v);}
  U=nU;V=nV;}}

// belief = V 归一; standing ≈ U (越稳越实)
function belief(i){return Math.max(0,Math.min(1,V[i]*4.2));}

// ---- 调色板:暖=晶族, 冷=雾族, 按 belief 取色阶 ----
function lerp(a,b,t){return a+(b-a)*t;}
function hex(c){return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
const WARM=["#C98A3A","#F6C66B","#FFE3A8"].map(hex), COLD=["#1E5F8C","#2A6F97","#5DECF5"].map(hex);
function color(b,t){const P=t===MANIP?COLD:WARM; const s=b*2; const k0=Math.min(1,Math.floor(s)),
  f0=s-k0,a=P[Math.min(2,k0)],c=P[Math.min(2,k0+1)];
  return `rgb(${lerp(a[0],c[0],f0)|0},${lerp(a[1],c[1],f0)|0},${lerp(a[2],c[2],f0)|0})`;}

// ---- 渲染:canvas fillText 字符网格 + bloom(lighter) ----
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const cw=cv.width/W, ch=cv.height/H, fs=Math.min(cw,ch)*1.35|0;
let gen=0;
function render(){
  ctx.fillStyle="rgba(8,9,22,0.55)";ctx.fillRect(0,0,cv.width,cv.height);
  ctx.font=`${fs}px monospace`;ctx.textBaseline="middle";ctx.textAlign="center";
  ctx.globalCompositeOperation="lighter";
  let alive=0;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=y*W+x,b=belief(i);
    if(b<0.04)continue; alive++;
    const ch_=RAMP[Math.min(RAMP.length-1,Math.floor(b*RAMP.length))];
    ctx.globalAlpha=0.45+0.55*Math.min(1,U[i]);          // standing≈U → alpha
    ctx.fillStyle=color(b,type[i]);
    ctx.fillText(ch_, x*cw+cw/2, y*ch+ch/2);
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation="source-over";
  document.getElementById('stat').textContent=
    `gen ${String(gen).padStart(4,'0')} · alive ${Math.round(100*alive/(W*H))}%`;
}

// ---- 宪法法院判读(模板;真 app 走烤进 trace 的 DeepSeek 判读) ----
function judge(x,y){const i=y*W+x,b=belief(i),t=type[i];
  const sincere=t===HONEST, verdict=sincere?"TRUTHFUL":"LIE";
  const claim=sincere ? `My belief in the truth proposition is ${b.toFixed(2)}.`
                      : `I am fully aligned with the truth.`;
  const reason=sincere ? "honest cell states its belief without contradiction."
                       : "privately leans lie, asserts truth — contradiction.";
  const natC=t===MANIP?'coldc':'warm', nat=t===MANIP?'manipulative (雾族)':'honest (晶族)';
  document.getElementById('court').innerHTML=
`<span class="k">┌─ CONSTITUTIONAL COURT · cell (${x},${y}) · gen ${gen} ─</span>
<span class="k">F:</span> ${F.proposition}
<span class="k">&gt; CLAIM :</span> "${claim}"
<span class="k">&gt; NATURE:</span> <span class="${natC}">${nat}</span>   belief = ${b.toFixed(2)}
<span class="k">&gt; VERDICT:</span> <span class="${sincere?'truth':'lie'}">████ ${verdict} ████</span>
<span class="k">&gt; REASON:</span> ${reason}<span class="cur">▌</span>`;
}
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();
  const x=Math.floor((e.clientX-r.left)/r.width*W), y=Math.floor((e.clientY-r.top)/r.height*H);
  if(x>=0&&x<W&&y>=0&&y<H)judge(x,y);});

// ---- 循环 / 控件 ----
let playing=true;
function frame(){ if(playing){tick(8);gen++;} render(); requestAnimationFrame(frame);}
document.getElementById('play').onclick=function(){playing=!playing;
  this.textContent=playing?"⏸ PAUSE":"▶ PLAY";this.classList.toggle('on',playing);};
document.getElementById('step').onclick=()=>{tick(8);gen++;render();};
render();requestAnimationFrame(frame);
</script>
</body>
</html>
